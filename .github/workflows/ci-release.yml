name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained true .\MrExStrap\MrExStrap.csproj

    - name: Upload Artifact
      id: upload-artifact
      uses: actions/upload-artifact@v7
      with:
        name: MrExBloxstrap (Release) (${{ github.sha }})
        path: .\MrExStrap\bin\Release\net6.0-windows\win-x64\publish\*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # needed for softprops/action-gh-release to create + upload assets on the tag's release
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: MrExBloxstrap (Release) (${{ github.sha }})
          path: release

      # SignPath Foundation signing — re-enable once the fork is approved.
      # Update organization-id / project-slug / signing-policy-slug / artifact-configuration-slug
      # to match your approved SignPath project, then uncomment.
      #
      # - name: Sign artifact
      #   uses: signpath/github-action-submit-signing-request@v2.0
      #   with:
      #     api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
      #     organization-id: 'YOUR_ORG_ID'
      #     project-slug: 'mrexlivechannelforcer'
      #     signing-policy-slug: 'release-signing'
      #     artifact-configuration-slug: 'github-ci'
      #     github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
      #     wait-for-completion: true
      #     output-artifact-directory: 'release'

      - name: Rename binary
        run: mv release/MrExBloxstrap.exe MrExBloxstrap-${{ github.ref_name }}.exe

      - name: Build portable ZIP
        run: |
          mkdir -p portable-build/MrExBloxstrap-Portable
          cp MrExBloxstrap-${{ github.ref_name }}.exe portable-build/MrExBloxstrap-Portable/MrExBloxstrap.exe
          cat > portable-build/MrExBloxstrap-Portable/portable.txt <<'EOF'
          # MrExBloxstrap portable-mode flag.
          #
          # The presence of this file (named "portable.txt") is what enables portable mode.
          # Delete this file to run as a normal install instead.
          #
          # By default, EVERYTHING stays in this folder — including the ~200 MB Roblox
          # client binaries. That works but is slow on USB sticks.
          #
          # Optional: uncomment the line below to keep config portable (it still travels with
          # the USB) while caching the heavy Roblox binaries to local AppData on whatever
          # machine you plug into. Installs become much faster, at the cost of having to
          # re-download once per new machine.
          #
          # cache=local
          EOF
          cat > portable-build/MrExBloxstrap-Portable/README.txt <<'EOF'
          MrExBloxstrap — portable edition

          This folder runs in portable mode. Keep portable.txt next to the exe
          and all settings, logs, and downloaded Roblox versions stay in this
          folder. Move the folder (USB stick, another PC) and your setup moves
          with it.

          OPTIONAL FAST MODE
          Open portable.txt and uncomment the "cache=local" line. With that on,
          settings/logs/mods/themes still travel with the folder, but the heavy
          Roblox binaries (~200 MB per build) cache to local AppData on whatever
          machine you plug into. Installs are MUCH faster on USB.

          To switch back to a normal install, delete portable.txt and relaunch.
          EOF
          cd portable-build && zip -r ../MrExBloxstrap-${{ github.ref_name }}-Portable.zip MrExBloxstrap-Portable

      - name: Verify portable ZIP integrity
        run: |
          set -e
          zip_name="MrExBloxstrap-${{ github.ref_name }}-Portable.zip"
          unzip -t "$zip_name"
          listing=$(unzip -Z1 "$zip_name")
          echo "$listing" | grep -q "MrExBloxstrap-Portable/MrExBloxstrap.exe" || { echo "::error::Portable zip is missing MrExBloxstrap.exe"; exit 1; }
          echo "$listing" | grep -q "MrExBloxstrap-Portable/portable.txt"      || { echo "::error::Portable zip is missing portable.txt"; exit 1; }

      - name: Generate SHA256SUMS
        run: |
          set -e
          sha256sum \
            MrExBloxstrap-${{ github.ref_name }}.exe \
            MrExBloxstrap-${{ github.ref_name }}-Portable.zip \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            MrExBloxstrap-${{ github.ref_name }}.exe
            MrExBloxstrap-${{ github.ref_name }}-Portable.zip
            SHA256SUMS
          name: MrExBloxstrap ${{ github.ref_name }}
